name: AI DevOps Pipeline

on:
  push:
    branches: [ main ]

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: ls -R

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Terraform Init
        run: |
          cd ai-devops-agent-main/terraform-review-agent/terraform
          terraform init

      - name: Terraform Validate
        run: |
          cd ai-devops-agent-main/terraform-review-agent/terraform
          terraform validate

      - name: Install Terrascan
        run: |
          curl -L https://github.com/tenable/terrascan/releases/download/v1.18.3/terrascan_1.18.3_Linux_x86_64.tar.gz \
          | tar -xz
          sudo mv terrascan /usr/local/bin/
          terrascan version

      - name: Terrascan Init
        run: terrascan init

      - name: Run Terrascan Scan
        run: |
          terrascan scan \
          -i terraform \
          -d ai-devops-agent-main/terraform-review-agent/terraform \
          -t aws \
          || true
